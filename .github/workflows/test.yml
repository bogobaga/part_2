name: Compile and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JUnit 5 dependencies
        run: |
          mkdir -p lib
          cd lib
          wget -q https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-api/5.10.3/junit-jupiter-api-5.10.3.jar
          wget -q https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-engine/5.10.3/junit-jupiter-engine-5.10.3.jar
          wget -q https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-params/5.10.3/junit-jupiter-params-5.10.3.jar
          wget -q https://repo1.maven.org/maven2/org/junit/platform/junit-platform-engine/1.10.3/junit-platform-engine-1.10.3.jar
          wget -q https://repo1.maven.org/maven2/org/junit/platform/junit-platform-commons/1.10.3/junit-platform-commons-1.10.3.jar
          wget -q https://repo1.maven.org/maven2/org/junit/platform/junit-platform-launcher/1.10.3/junit-platform-launcher-1.10.3.jar
          wget -q https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console/1.10.3/junit-platform-console-1.10.3.jar
          wget -q https://repo1.maven.org/maven2/org/apiguardian/apiguardian-api/1.1.2/apiguardian-api-1.1.2.jar
          wget -q https://repo1.maven.org/maven2/org/opentest4j/opentest4j/1.3.0/opentest4j-1.3.0.jar
          cd ..
      
      - name: Fix package declarations in Java files
        run: |
          # Add missing package declarations if not present
          for file in *.java; do
            if [ -f "$file" ] && ! grep -q "^package" "$file"; then
              echo "Adding package to $file"
              if [[ "$file" == "RegisterTest.java" ]]; then
                sed -i '1i package Register;' "$file"
              elif [[ "$file" != "testMessage.java" ]]; then
                sed -i '1i package test.registration2;' "$file"
              fi
            fi
          done
      
      - name: Create directory structure for compiled classes
        run: |
          mkdir -p target/classes
          mkdir -p target/test-classes
          mkdir -p target/classes/test/registration2
          mkdir -p target/test-classes/Register
      
      - name: Compile main Java files
        run: |
          javac -d target/classes -cp "lib/*" *.java 2>&1
      
      - name: Compile test Java files
        run: |
          javac -d target/test-classes -cp "target/classes:lib/*" *Test.java 2>&1
      
      - name: Run JUnit tests
        run: |
          java -jar lib/junit-platform-console-1.10.3.jar \
            --class-path target/classes:target/test-classes:lib/* \
            --scan-class-path \
            --fail-if-no-tests \
            --details verbose
      
      - name: Save test results
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests completed successfully!" >> $GITHUB_STEP_SUMMARY
