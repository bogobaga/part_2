name: Compile and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JUnit 5 dependencies
        run: |
          mkdir -p lib
          cd lib
          wget -nv https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-api/5.10.3/junit-jupiter-api-5.10.3.jar
          wget -nv https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-engine/5.10.3/junit-jupiter-engine-5.10.3.jar
          wget -nv https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-params/5.10.3/junit-jupiter-params-5.10.3.jar
          wget -nv https://repo1.maven.org/maven2/org/junit/platform/junit-platform-engine/1.10.3/junit-platform-engine-1.10.3.jar
          wget -nv https://repo1.maven.org/maven2/org/junit/platform/junit-platform-commons/1.10.3/junit-platform-commons-1.10.3.jar
          wget -nv https://repo1.maven.org/maven2/org/junit/platform/junit-platform-launcher/1.10.3/junit-platform-launcher-1.10.3.jar
          wget -nv https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console/1.10.3/junit-platform-console-1.10.3.jar
          wget -nv https://repo1.maven.org/maven2/org/apiguardian/apiguardian-api/1.1.2/apiguardian-api-1.1.2.jar
          wget -nv https://repo1.maven.org/maven2/org/opentest4j/opentest4j/1.3.0/opentest4j-1.3.0.jar
          cd ..

      - name: Create directory structure
        run: |
          mkdir -p target/classes
          mkdir -p target/test-classes

      - name: Compile all Java files
        run: |
          # Find all Java files and compile them together
          find . -name "*.java" -type f > sources.txt
          if [ -s sources.txt ]; then
            javac -d target/classes -cp "lib/*" @sources.txt
          else
            echo "No Java files found!"
            exit 1
          fi

      - name: Run JUnit tests
        run: |
          java -jar lib/junit-platform-console-1.10.3.jar \
            --class-path target/classes:lib/* \
            --scan-class-path \
            --fail-if-no-tests \
            --details verbose \
            --include-engine junit-jupiter

      - name: Test summary
        if: always()
        run: |
          echo "## ✅ Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Workflow completed | All steps executed successfully |" >> $GITHUB_STEP_SUMMARY
