name: Java CI with JUnit
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download JUnit
      run: |
        wget -q https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar
        wget -q https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar

    - name: Compile the code
      run: |
        javac -cp .:junit-4.13.2.jar src/test/*.java

    - name: Run tests
      run: |
        java -cp .:junit-4.13.2.jar:hamcrest-core-1.3.jar org.junit.runner.JUnitCore test.testMessage
