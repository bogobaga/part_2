name: Java CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 17
      uses: actions/setup-java@v2
      with:
        java-version: '17'
    - name: Run tests
      run: javac -cp .:junit-jupiter-api-5.8.1.jar test/registration2/*.java && java -jar junit-platform-console-standalone-1.8.1.jar
