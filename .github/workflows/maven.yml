name: unit test

on:[pull_request]

jobs:
  tests:
  runs-on: ubuntu-latest

  strategy;
    matrix:
        node-version: [16.x]

  steps:
  -users: actions/checkout@v2
  -name: Use Node.js ${{ matric.node-version }}
   uses: actions/setup-node@v1
   with:
     node-version: ${{ matrix.node-version }}
     -name: npm install
     run: npm ci
     -name: test
     run: npm test
