name: Java CI with JUnit
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Download JUnit 5
      run: |
        wget -q https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.0/junit-platform-console-standalone-1.10.0.jar
    - name: Compile the code
      run: |
        javac -d . -cp .:junit-platform-console-standalone-1.10.0.jar src/test/java/testMessage.java src/registration2/Message.java
    - name: Run tests
      run: |
        java -cp .:junit-platform-console-standalone-1.10.0.jar org.junit.platform.console.ConsoleLauncher --select-class=test.registration2.testMessage
